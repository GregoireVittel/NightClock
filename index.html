<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Night Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #c0392b;
    --red-dim: #7a1f16;
    --red-glow: rgba(192, 57, 43, 0.15);
    --bg: #0a0604;
    --text: #d4503a;
    --text-dim: #8a3228;
    --divider: #3a1a14;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Bodoni Moda', serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    cursor: none;
  }

  /* Subtle vignette */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 10;
  }

  /* Grain texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.3;
    pointer-events: none;
    z-index: 9;
  }

  .clock-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
    z-index: 20;
    animation: fadeIn 3s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .time {
    font-size: clamp(90px, 28vw, 180px);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 0.9;
    color: var(--text);
    text-shadow:
      0 0 60px rgba(192, 57, 43, 0.4),
      0 0 120px rgba(192, 57, 43, 0.15);
    transition: color 2s ease;
    font-variant-numeric: tabular-nums;
  }

  .time .colon {
    opacity: 1;
    display: inline-block;
    margin: 0 2px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: var(--divider);
    margin: 18px 0 16px;
  }

  .bottom-row {
    display: flex;
    align-items: center;
    gap: 28px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-size: clamp(11px, 3vw, 15px);
    color: var(--text-dim);
  }

  .date { }
  .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--divider);
  }
  .day { }

  /* Wake lock status — tiny, barely visible */
  #wl-status {
    position: fixed;
    bottom: 18px;
    right: 20px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #2a1008;
    z-index: 30;
    transition: color 1s ease;
  }
  #wl-status.active { color: #3a1a14; }

  /* Tap to dim overlay */
  #dim-overlay {
    position: fixed;
    inset: 0;
    background: black;
    opacity: 0;
    z-index: 50;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  body.dimmed #dim-overlay {
    opacity: 0.85;
    pointer-events: auto;
  }
  #dim-hint {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #2a1008;
    z-index: 30;
    text-transform: uppercase;
    opacity: 0;
    animation: hintFade 6s ease 4s forwards;
  }
  @keyframes hintFade {
    0% { opacity: 0; }
    20% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="dim-overlay" onclick="undim()"></div>

<div class="clock-wrap">
  <div class="time">
    <span id="hours">00</span><span class="colon">:</span><span id="minutes">00</span>
  </div>
  <div class="divider"></div>
  <div class="bottom-row">
    <span class="date" id="date-str"></span>
    <div class="dot"></div>
    <span class="day" id="day-str"></span>
  </div>
</div>

<div id="wl-status">◉</div>
<div id="dim-hint">tap to dim</div>

<script>
  // ── Clock ──────────────────────────────────────────────
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function update() {
    const now = new Date();
    let h = now.getHours();
    let m = now.getMinutes();
    document.getElementById('hours').textContent = String(h).padStart(2, '0');
    document.getElementById('minutes').textContent = String(m).padStart(2, '0');
    document.getElementById('date-str').textContent =
      `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
    document.getElementById('day-str').textContent = days[now.getDay()];
  }

  update();
  setInterval(update, 1000);

  // ── Wake Lock ──────────────────────────────────────────
  let wakeLock = null;
  const wlEl = document.getElementById('wl-status');

  async function requestWakeLock() {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wlEl.classList.add('active');
      wlEl.title = 'Screen wake lock active';
      wakeLock.addEventListener('release', () => {
        wlEl.classList.remove('active');
      });
    } catch (err) {
      console.log('Wake lock not available:', err.message);
    }
  }

  if ('wakeLock' in navigator) {
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
  }

  // ── Tap to dim / undim ────────────────────────────────
  document.body.addEventListener('click', (e) => {
    if (e.target.id === 'dim-overlay') return;
    document.body.classList.toggle('dimmed');
  });

  function undim() {
    document.body.classList.remove('dimmed');
  }
</script>
</body>
</html>
