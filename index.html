<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Night Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Simonetta:ital,wght@0,400;0,900;1,400;1,900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000000;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Simonetta', Georgia, serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,1) 100%);
  pointer-events: none;
}

.time {
  font-size: 22vw;
  font-weight: 400;
  line-height: 1;
  color: #2a0603;
  text-shadow: none;
  font-variant-numeric: tabular-nums;
}

.divider {
  width: 60px;
  height: 1px;
  background: #1a0503;
  margin: 20px 0 16px;
}

.bottom-row {
  display: flex;
  align-items: center;
  gap: 24px;
  font-family: 'Simonetta', Georgia, serif;
  font-weight: 400;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  font-size: 26px;
  color: #2a0603;
}

.dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: #1a0503;
}

#wl-status {
  position: fixed;
  bottom: 18px;
  right: 20px;
  font-size: 10px;
  color: #1a0804;
}
</style>
</head>
<body>

<div class="time" id="clock">--:--</div>
<div class="divider"></div>
<div class="bottom-row">
  <span id="datestr" style="font-weight: 500;">---</span>
  <div class="dot"></div>
  <span id="daystr" style="font-weight: 500;">---</span>
  <div class="dot"></div>
  <span style="font-weight: 500;">Temp. <span id="tempstr">--°</span></span>
</div>

<div id="wl-status">◉</div>

<script>
var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function tick() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var hh = (h < 10 ? '0' : '') + h;
  var mm = (m < 10 ? '0' : '') + m;
  document.getElementById('clock').textContent = hh + ':' + mm;

  var dd = (now.getDate() < 10 ? '0' : '') + now.getDate();
  var mo = (now.getMonth() + 1 < 10 ? '0' : '') + (now.getMonth() + 1);
  var yy = String(now.getFullYear()).slice(-2);
  document.getElementById('datestr').textContent = dd + '/' + mo + '/' + yy;
  document.getElementById('daystr').textContent = days[now.getDay()];
}

function fetchTemp() {
  fetch('https://api.open-meteo.com/v1/forecast?latitude=48.867&longitude=2.133&current=temperature_2m&temperature_unit=celsius')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var t = Math.round(data.current.temperature_2m);
      document.getElementById('tempstr').textContent = t + '°';
    })
    .catch(function() {});
}

tick();
setInterval(tick, 1000);
fetchTemp();
setInterval(fetchTemp, 10 * 60 * 1000);

if ('wakeLock' in navigator) {
  navigator.wakeLock.request('screen').then(function(lock) {
    document.getElementById('wl-status').style.color = '#1a0503';
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') {
        navigator.wakeLock.request('screen');
      }
    });
  }).catch(function(e) {});
}
</script>
</body>
</html>
