<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Night Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Simonetta:ital,wght@0,400;0,900;1,400;1,900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000000;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Simonetta', Georgia, serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,1) 100%);
  pointer-events: none;
}

.time {
  font-size: 22vw;
  font-weight: 300;
  line-height: 1;
  color: #6b0f0a;
  text-shadow: 0 0 60px rgba(180,20,10,0.5), 0 0 120px rgba(180,20,10,0.2);
  font-variant-numeric: tabular-nums;
}

.divider {
  width: 60px;
  height: 1px;
  background: #5a1510;
  margin: 20px 0 16px;
}

.bottom-row {
  display: flex;
  align-items: center;
  gap: 24px;
  font-family: 'Simonetta', Georgia, serif;
  font-weight: 400;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  font-size: 21px;
  color: #6b0f0a;
}

.dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: #5a1510;
}

#wl-status {
  position: fixed;
  bottom: 18px;
  right: 20px;
  font-size: 10px;
  color: #1a0804;
}
</style>
</head>
<body>

<div class="time" id="clock">--:--</div>
<div class="divider"></div>
<div class="bottom-row">
  <span id="datestr" style="font-weight: 600;">---</span>
  <div class="dot"></div>
  <span id="daystr" style="font-weight: 600; font-size: 14px;">---</span>
</div>

<div id="wl-status">◉</div>

<script>
var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function tick() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var hh = (h < 10 ? '0' : '') + h;
  var mm = (m < 10 ? '0' : '') + m;
  document.getElementById('clock').textContent = hh + ':' + mm;
  document.getElementById('datestr').textContent = now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
  document.getElementById('daystr').textContent = days[now.getDay()];
}

tick();
setInterval(tick, 1000);

if ('wakeLock' in navigator) {
  navigator.wakeLock.request('screen').then(function(lock) {
    document.getElementById('wl-status').style.color = '#5a1510';
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') {
        navigator.wakeLock.request('screen');
      }
    });
  }).catch(function(e) {});
}
</script>
</body>
</html>
